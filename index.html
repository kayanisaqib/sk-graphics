<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>SK Graphics | Digital Brand Design & Interactive Web Solutions</title>
    <meta name="description" content="Official portfolio of SK Graphics. Specializing in WebGL structures, fluid animations, and high-conversion digital brand design.">
    
    <!-- Premium Professional Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0; 
            padding: 0;
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #050505;
            color: #ffffff;
            scroll-behavior: smooth;
        }

        /* Frosted Glass Navigation Bar */
        nav {
            position: fixed; 
            top: 0; 
            width: 100%;
            padding: 20px 40px; 
            box-sizing: border-box;
            display: flex; 
            justify-content: space-between;
            align-items: center;
            z-index: 100; 
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(15px); 
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo { 
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem; 
            font-weight: 700; 
            letter-spacing: 2px; 
        }

        /* Hero Landing Section */
        .hero {
            position: relative; 
            width: 100%;
            height: 100vh;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            text-align: center;
        }

        #glcanvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
            opacity: 0.6;
        }

        .hero-content { 
            z-index: 2; 
            pointer-events: none; 
        }

        h1 { 
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 6vw, 5.5rem); 
            letter-spacing: 4px; 
            margin-bottom: 15px; 
        }

        h2 { 
            font-size: clamp(0.9rem, 1.5vw, 1.2rem); 
            color: #aaaaaa; 
            font-weight: 300; 
            letter-spacing: 5px; 
            text-transform: uppercase;
        }

        /* Bouncing Scroll Indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: #ffffff;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 3px;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: bounce 2s infinite;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .scroll-indicator:hover {
            opacity: 1;
        }

        .scroll-indicator span {
            margin-top: 10px;
            font-size: 1.2rem;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0) translateX(-50%); }
            40% { transform: translateY(-15px) translateX(-50%); }
            60% { transform: translateY(-7px) translateX(-50%); }
        }

        /* Automated Image Gallery Section */
        .gallery-section {
            padding: 100px 20px;
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .gallery-title {
            text-align: center;
            margin-bottom: 60px;
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            letter-spacing: 2px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
        }

        /* Professional Image Cards */
        .gallery-card {
            background: #111111;
            border: 1px solid #222222;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
            border: 1px solid #333333;
        }

        .gallery-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
            border-bottom: 1px solid #222222;
        }

        .card-content {
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin: 0 0 20px 0;
            color: #eeeeee;
        }

        .download-btn {
            display: inline-block;
            padding: 12px 25px;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            border-radius: 4px;
            transition: background 0.3s, color 0.3s;
        }

        .download-btn:hover {
            background: #444444;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- Navigation Header -->
    <nav>
        <div class="logo">SK GRAPHICS</div>
    </nav>

    <!-- Visual Hero Section -->
    <section class="hero" id="home">
        <canvas id="glcanvas"></canvas>
        <div class="hero-content">
            <h1>SK Graphics</h1>
            <h2>Interactive Digital Brand Design</h2>
        </div>
        
        <!-- Animated Scroll Indicator -->
        <a href="#portfolio" class="scroll-indicator">
            SCROLL TO EXPLORE
            <span>&#8595;</span>
        </a>
    </section>

    <!-- Portfolio Gallery Section -->
    <section class="gallery-section" id="portfolio">
        <h2 class="gallery-title">Featured Projects</h2>
        <div class="gallery-grid" id="auto-gallery">
            <!-- The script below will automatically build your image cards here -->
        </div>
    </section>

    <script>
        // Kinetic Background Animation
        const canvas = document.getElementById('glcanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.8;
                this.vy = (Math.random() - 0.5) * 0.8;
                this.size = Math.random() * 1.5 + 0.5;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 90; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 150) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 255, 255, ${(150 - distance) / 1200})`;
                        ctx.lineWidth = 0.8;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // Advanced GitHub Image Fetcher (Creates Cards, Titles, and Download Buttons)
        async function loadPortfolioImages() {
            const repoUrl = 'https://api.github.com/repos/kayanisaqib/sk-graphics/contents/';
            
            try {
                const response = await fetch(repoUrl);
                const files = await response.json();
                const gallery = document.getElementById('auto-gallery');
                
                files.forEach(file => {
                    // Check if file is an image
                    if (file.name.match(/\.(jpeg|jpg|png|gif|webp)$/i)) {
                        
                        // 1. Create the Card Container
                        const card = document.createElement('div');
                        card.className = 'gallery-card';

                        // 2. Create the Image
                        const img = document.createElement('img');
                        img.src = file.name;
                        img.alt = "SK Graphics Project";

                        // 3. Create the Content Box (for Title & Button)
                        const contentBox = document.createElement('div');
                        contentBox.className = 'card-content';

                        // 4. Generate the Title (Removes .jpg/.png and replaces hyphens with spaces)
                        const rawTitle = file.name.split('.')[0].replace(/-/g, ' ');
                        const cardTitle = document.createElement('h3');
                        cardTitle.className = 'card-title';
                        cardTitle.textContent = rawTitle.toUpperCase();

                        // 5. Create the Download Button
                        const downloadBtn = document.createElement('a');
                        downloadBtn.className = 'download-btn';
                        downloadBtn.href = file.name;
                        downloadBtn.download = file.name;
                        downloadBtn.innerHTML = '&#8595; DOWNLOAD FILE';

                        // 6. Assemble everything
                        contentBox.appendChild(cardTitle);
                        contentBox.appendChild(downloadBtn);
                        card.appendChild(img);
                        card.appendChild(contentBox);
                        
                        // 7. Add to Gallery
                        gallery.appendChild(card);
                    }
                });
            } catch (error) {
                console.log("Error finding images:", error);
            }
        }
        
        loadPortfolioImages();
    </script>
</body>
</html>
