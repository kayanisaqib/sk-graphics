<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK Graphics | Archive</title>
    
    <!-- Importing Elite Architectural Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #030303;
            --text-main: #ffffff;
            --text-muted: #777777;
            --accent: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            /* Cinematic Fade In */
            animation: cinematicEntry 2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            
            /* Architectural Blueprint Grid */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            background-position: center top;
        }

        @keyframes cinematicEntry {
            0% { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        header {
            padding: 6rem 2rem 4rem 2rem;
            text-align: center;
            position: relative;
        }

        /* Glowing Ambient Light Behind Text */
        header::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; height: 100px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        header h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(1.5rem, 5vw, 3rem);
            font-weight: 700;
            letter-spacing: 8px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            margin-bottom: 1rem;
        }

        header p {
            color: var(--text-muted);
            font-size: clamp(0.8rem, 3vw, 1rem);
            letter-spacing: 3px;
            font-weight: 300;
            text-transform: uppercase;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2.5rem;
            padding: 0 2rem 6rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            position: relative;
            cursor: pointer;
            border-radius: 2px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 3/4;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.6s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 20px rgba(255,255,255,0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(0.7);
            transition: filter 0.8s ease, transform 0.8s ease;
        }

        .card:hover img {
            filter: grayscale(0%) brightness(1);
            transform: scale(1.03);
        }

        .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 3rem 1.5rem 1.5rem 1.5rem;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.5s ease;
            pointer-events: none;
        }

        .card:hover .card-info {
            transform: translateY(0);
            opacity: 1;
        }

        .card-info h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            letter-spacing: 1px;
        }

        .card-info p {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- V2 LIGHTBOX ENGINE --- */
        #lightbox {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        #lightbox img {
            max-width: 90vw;
            max-height: 65vh;
            object-fit: contain;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
            transform: scale(0.95) translateY(10px);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #lightbox.active img {
            transform: scale(1) translateY(0);
        }

        .lightbox-controls {
            margin-top: 2.5rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
            width: 100%;
            padding: 0 1rem;
        }

        .lightbox-meta {
            width: 100%;
            max-width: 90vw;
        }

        .lightbox-meta h2 {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
            color: #fff;
        }

        .lightbox-meta p {
            color: var(--text-muted);
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .btn {
            background: transparent;
            color: var(--text-main);
            border: 1px solid rgba(255,255,255,0.4);
            padding: 1rem 2rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            border-radius: 2px; /* Architecturally square corners */
            text-decoration: none;
            transition: all 0.4s ease;
            display: inline-block;
            width: 100%;
            max-width: 260px; /* Prevents mobile clipping */
            text-align: center;
        }

        .btn:hover {
            background: var(--text-main);
            color: var(--bg-color);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .close-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 2.5rem;
            color: #555;
            cursor: pointer;
            transition: color 0.4s, transform 0.4s;
            background: none;
            border: none;
            padding: 15px;
            line-height: 1;
            z-index: 10001;
        }

        .close-btn:hover {
            color: var(--text-main);
            transform: rotate(90deg);
        }
    </style>
</head>
<body>

    <header>
        <h1>SK Graphics</h1>
        <p>Digital Architecture & Spatial Design</p>
    </header>

    <div class="grid-container" id="gallery-grid">
        <!-- Database Injection -->
    </div>

    <div id="lightbox">
        <button class="close-btn" id="lightbox-close">&times;</button>
        <img id="lightbox-img" src="" alt="Full Screen Art">
        <div class="lightbox-controls">
            <div class="lightbox-meta">
                <h2 id="lightbox-title">Loading Title...</h2>
                <p id="lightbox-category">Loading Category...</p>
            </div>
            <a href="#" id="lightbox-download" download class="btn">Download Asset</a>
        </div>
    </div>

    <script>
        fetch('./gallery.json')
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.json();
            })
            .then(data => {
                const grid = document.getElementById('gallery-grid');
                grid.innerHTML = ''; 

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    card.onclick = () => openLightbox(item.imageUrl, item.title, item.category, item.client);

                    card.innerHTML = `
                        <img src="${item.imageUrl}" alt="${item.title}" loading="lazy">
                        <div class="card-info">
                            <h3>${item.title}</h3>
                            <p>${item.category} &bull; ${item.client}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('gallery-grid').innerHTML = '<p style="text-align:center; width:100%; color:#555; letter-spacing:2px; font-size:0.8rem;">Initializing Database...</p>';
            });

        const lightbox = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightbox-img');
        const lbTitle = document.getElementById('lightbox-title');
        const lbCat = document.getElementById('lightbox-category');
        const lbDownload = document.getElementById('lightbox-download');
        const closeBtn = document.getElementById('lightbox-close');

        function openLightbox(url, title, category, client) {
            lbImg.src = url;
            lbTitle.innerText = title;
            lbCat.innerText = category + " | " + client;
            
            lbDownload.href = url;
            const fileName = url.split('/').pop();
            lbDownload.download = fileName;

            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden'; 
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto'; 
            setTimeout(() => { if(!lightbox.classList.contains('active')) lbImg.src = ''; }, 500);
        }

        closeBtn.onclick = closeLightbox;

        lightbox.onclick = (e) => {
            if(e.target === lightbox) {
                closeLightbox();
            }
        };
    </script>
</body>
</html>
