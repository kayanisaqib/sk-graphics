<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK GRAPHICS — ARCHIVE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500&family=Syne:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #0a0a0a;
            --color-text: #f5f5f5;
            --color-dim: #707070;
            --border-ui: rgba(255, 255, 255, 0.06);
            --font-display: 'Syne', sans-serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-sans);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #gl-viewport {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .view-layer {
            position: relative;
            z-index: 2;
            max-width: 1600px;
            margin: 0 auto;
            padding: 120px 40px;
        }

        @media (max-width: 768px) {
            .view-layer {
                padding: 60px 20px;
            }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 100px;
            border-bottom: 1px solid var(--border-ui);
            padding-bottom: 40px;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
                margin-bottom: 60px;
            }
        }

        .brand-meta h1 {
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: 700;
            margin: 0;
            line-height: 0.9;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .brand-meta p {
            margin: 12px 0 0 0;
            font-size: 0.9rem;
            color: var(--color-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .brand-status {
            font-size: 0.8rem;
            color: var(--color-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: right;
        }

        @media (max-width: 768px) {
            .brand-status {
                text-align: left;
            }
        }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 40px 24px;
            width: 100%;
        }

        .item-node {
            grid-column: span 4;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        @media (max-width: 1024px) {
            .item-node {
                grid-column: span 6;
            }
        }

        @media (max-width: 640px) {
            .item-node {
                grid-column: span 12;
            }
        }

        .item-node:nth-child(2n) {
            margin-top: 40px;
        }

        @media (max-width: 640px) {
            .item-node:nth-child(2n) {
                margin-top: 0;
            }
        }

        .surface-container {
            width: 100%;
            aspect-ratio: 4 / 5;
            background: #111111;
            overflow: hidden;
            position: relative;
            border-radius: 2px;
        }

        .surface-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) contrast(1.1);
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), filter 0.8s ease;
        }

        .item-node:hover .surface-container img {
            transform: scale(1.05);
            filter: grayscale(0) contrast(1);
        }

        .node-meta {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .node-title {
            font-size: 1.1rem;
            font-weight: 400;
            margin: 0;
            letter-spacing: -0.3px;
        }

        .node-client {
            font-size: 0.85rem;
            color: var(--color-dim);
            margin: 4px 0 0 0;
        }

        .node-tag {
            font-size: 0.75rem;
            color: var(--color-dim);
            border: 1px solid var(--border-ui);
            padding: 4px 10px;
            border-radius: 100px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-log {
            grid-column: span 12;
            text-align: center;
            font-size: 0.9rem;
            color: var(--color-dim);
            padding: 140px 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="gl-viewport"></div>

    <main class="view-layer">
        <header>
            <div class="brand-meta">
                <h1>SK Graphics</h1>
                <p>Digital Art & Brand Architecture</p>
            </div>
            <div class="brand-status">
                Index / 2026 Edition<br>Available for Commissions
            </div>
        </header>

        <section class="collection-grid" id="main-grid">
            <div class="status-log">Loading Archive Data...</div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const container = document.getElementById('gl-viewport');
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const fragmentShader = `
            uniform float u_time;
            uniform vec2 u_resolution;
            
            float hash(vec2 p) {
                return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
            }

            float noise(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                vec2 u = f*f*(3.0-2.0*f);
                return mix(mix(hash(i + vec2(0.0,0.0)), hash(i + vec2(1.0,0.0)), u.x),
                           mix(hash(i + vec2(0.0,1.0)), hash(i + vec2(1.0,1.0)), u.x), u.y);
            }

            void main() {
                vec2 uv = gl_FragCoord.xy / u_resolution.xy;
                vec2 p = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / min(u_resolution.x, u_resolution.y);
                
                float t = u_time * 0.08;
                vec2 o = vec2(noise(p + t), noise(p + vec2(1.2)));
                vec2 n = vec2(noise(p + o + vec2(3.4, 5.6) + t), noise(p + o + vec2(1.0)));
                
                float f = noise(p + n + t);
                
                vec3 c1 = vec3(0.04, 0.04, 0.04);
                vec3 c2 = vec3(0.09, 0.09, 0.11);
                vec3 color = mix(c1, c2, f * f * 1.5);
                
                float grain = (hash(uv + u_time) - 0.5) * 0.015;
                color += vec3(grain);
                
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const uniforms = {
            u_time: { value: 0 },
            u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
        };

        const material = new THREE.ShaderMaterial({
            fragmentShader: fragmentShader,
            uniforms: uniforms
        });

        const plane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
        scene.add(plane);

        function tick(timestamp) {
            uniforms.u_time.value = timestamp * 0.001;
            renderer.render(scene, camera);
            requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
        });

        async function initPipeline() {
            const grid = document.getElementById('main-grid');
            try {
                const response = await fetch('./gallery.json');
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                grid.innerHTML = '';
                
                data.forEach(node => {
                    const el = document.createElement('div');
                    el.className = 'item-node';
                    el.innerHTML = `
                        <div class="surface-container">
                            <img src="${node.imageUrl}" alt="${node.title}" loading="lazy">
                        </div>
                        <div class="node-meta">
                            <div>
                                <h3 class="node-title">${node.title}</h3>
                                <p class="node-client">${node.client}</p>
                            </div>
                            <span class="node-tag">${node.category}</span>
                        </div>
                    `;
                    grid.appendChild(el);
                });
            } catch {
                grid.innerHTML = `<div class="status-log">Pipeline exception. Verify structural syntax.</div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', initPipeline);
    </script>
</body>
</html>
