<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SK Graphics | Archive</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* Base Architecture */
        :root { --bg: #030303; --surface: #111111; --text: #ffffff; --muted: #888888; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }

        /* Typography & Grid */
        header { padding: 4rem 1.5rem; text-align: center; }
        header h1 { font-family: 'Syncopate', sans-serif; font-size: clamp(1.5rem, 5vw, 2.5rem); text-transform: uppercase; letter-spacing: 5px; }
        header p { color: var(--muted); margin-top: 0.5rem; letter-spacing: 2px; font-size: 0.85rem; text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; padding: 0 1.5rem 4rem; max-width: 1400px; margin: auto; }
        
        .card { position: relative; border-radius: 4px; overflow: hidden; background: var(--surface); cursor: pointer; transform: translateZ(0); }
        .card::before { content: ""; display: block; padding-bottom: 133%; } 
        .card img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); filter: grayscale(100%) brightness(0.8); }
        .card:hover img { transform: scale(1.05); filter: grayscale(0%) brightness(1); }

        /* Mobile-Optimized Info Overlay */
        .card-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 2.5rem 1.5rem 1.5rem; background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; opacity: 0; transition: opacity 0.4s ease; }
        .card:hover .card-overlay { opacity: 1; }
        @media (max-width: 768px) { .card-overlay { opacity: 1; } } /* Always show on mobile grid */
        
        .card-title { font-weight: 600; font-size: 1.1rem; letter-spacing: 1px; margin-bottom: 4px; }
        .card-cat { font-size: 0.75rem; color: #aaaaaa; text-transform: uppercase; letter-spacing: 2px; }

        /* --- VIEWER PLATFORM --- */
        #viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        #viewer.active { opacity: 1; pointer-events: auto; }

        /* Fixed Top Navigation */
        .viewer-nav { padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; background: rgba(3,3,3,0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .back-btn { background: none; border: none; color: var(--text); font-size: 1rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-family: 'Space Grotesk', sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;}
        
        .download-btn { background: #ffffff; color: #000000; text-decoration: none; padding: 0.7rem 1.2rem; border-radius: 30px; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; transition: transform 0.2s; }
        .download-btn:active { transform: scale(0.95); }

        /* Scrollable Content Area */
        .viewer-content { flex: 1; overflow-y: auto; padding: 2rem 1.5rem; display: flex; flex-direction: column; align-items: center; }
        
        #viewer-img { width: 100%; max-width: 1000px; height: auto; border-radius: 2px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); margin-bottom: 2rem; }
        
        .viewer-details { width: 100%; max-width: 1000px; padding-bottom: 4rem; text-align: left; }
        .viewer-details h2 { font-size: clamp(1.2rem, 4vw, 2rem); margin-bottom: 1.5rem; font-family: 'Syncopate', sans-serif; letter-spacing: 2px; line-height: 1.2; }
        
        /* PREMIUM METADATA GRID */
        .meta-grid { display: flex; gap: 3rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1.5rem; flex-wrap: wrap; }
        .meta-block { display: flex; flex-direction: column; gap: 0.4rem; }
        .meta-label { font-size: 0.65rem; color: #555555; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
        .meta-value { color: #cccccc; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <header>
        <h1>SK Graphics</h1>
        <p>Digital Architecture & Spatial Design</p>
    </header>

    <div class="grid" id="gallery-grid"></div>

    <div id="viewer">
        <div class="viewer-nav">
            <button class="back-btn" id="close-viewer">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back
            </button>
            <a href="#" id="download-asset" download class="download-btn">Download Art</a>
        </div>
        
        <div class="viewer-content">
            <img id="viewer-img" src="" alt="Artwork">
            <div class="viewer-details">
                <h2 id="viewer-title">Title</h2>
                
                <div class="meta-grid" id="viewer-meta-grid">
                    </div>

            </div>
        </div>
    </div>

    <script>
        fetch('./gallery.json')
            .then(r => r.json())
            .then(data => {
                const grid = document.getElementById('gallery-grid');
                grid.innerHTML = ''; 
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openViewer(item);
                    card.innerHTML = `
                        <img src="${item.imageUrl}" alt="${item.title}" loading="lazy">
                        <div class="card-overlay">
                            <div class="card-title">${item.title}</div>
                            <div class="card-cat">${item.category}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            })
            .catch(e => { 
                document.getElementById('gallery-grid').innerHTML = '<p style="text-align:center;">Initializing Asset Database...</p>'; 
            });

        const viewer = document.getElementById('viewer');
        const vImg = document.getElementById('viewer-img');
        const vTitle = document.getElementById('viewer-title');
        const vMetaGrid = document.getElementById('viewer-meta-grid');
        const vDownload = document.getElementById('download-asset');
        let isViewerOpen = false;

        function openViewer(item) {
            vImg.src = item.imageUrl;
            vTitle.innerText = item.title;
            
            // Injecting structured columns instead of a flat string
            vMetaGrid.innerHTML = `
                <div class="meta-block">
                    <span class="meta-label">Discipline</span>
                    <span class="meta-value">${item.category}</span>
                </div>
                <div class="meta-block">
                    <span class="meta-label">Client / Sector</span>
                    <span class="meta-value">${item.client}</span>
                </div>
            `;
            
            vDownload.href = item.imageUrl;
            vDownload.download = item.imageUrl.split('/').pop();

            viewer.classList.add('active');
            document.body.style.overflow = 'hidden';
            isViewerOpen = true;

            history.pushState({ viewerOpen: true }, "", "#artwork");
        }

        function closeViewer(fromHistory = false) {
            viewer.classList.remove('active');
            document.body.style.overflow = 'auto';
            isViewerOpen = false;
            
            if (!fromHistory) { history.back(); }
            setTimeout(() => { if(!isViewerOpen) vImg.src = ''; }, 300);
        }

        document.getElementById('close-viewer').onclick = () => closeViewer(false);

        window.addEventListener('popstate', (e) => {
            if (isViewerOpen) {
                closeViewer(true);
            }
        });
    </script>
</body>
</html>
