<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>SK Graphics | Digital Brand Design & Interactive Web Solutions</title>
    <meta name="description" content="Official portfolio of SK Graphics. Specializing in WebGL structures, fluid animations, and high-conversion digital brand design.">
    
    <style>
        body, html {
            margin: 0; 
            padding: 0;
            width: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #050505;
            color: #ffffff;
            scroll-behavior: smooth;
        }

        /* Frosted Glass Navigation Bar */
        nav {
            position: fixed; 
            top: 0; 
            width: 100%;
            padding: 20px 40px; 
            box-sizing: border-box;
            display: flex; 
            justify-content: space-between;
            align-items: center;
            z-index: 100; 
            background: rgba(5, 5, 5, 0.7);
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo { 
            font-size: 1.2rem; 
            font-weight: 700; 
            letter-spacing: 3px; 
        }

        /* Hero Landing Section */
        .hero {
            position: relative; 
            width: 100%;
            height: 100vh;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            text-align: center;
        }

        #glcanvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
            opacity: 0.8;
        }

        .hero-content { 
            z-index: 2; 
            pointer-events: none; 
        }

        h1 { 
            font-size: clamp(2.5rem, 5vw, 4.5rem); 
            letter-spacing: 6px; 
            margin-bottom: 10px; 
            text-transform: uppercase; 
        }

        h2 { 
            font-size: clamp(1rem, 2vw, 1.3rem); 
            color: #888888; 
            font-weight: 300; 
            letter-spacing: 3px; 
        }

        /* Automated Image Gallery Section */
        .gallery-section {
            padding: 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .gallery-grid img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .gallery-grid img:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <!-- Navigation Header -->
    <nav>
        <div class="logo">SK GRAPHICS</div>
    </nav>

    <!-- Visual Hero Section -->
    <section class="hero">
        <canvas id="glcanvas"></canvas>
        <div class="hero-content">
            <h1>SK Graphics</h1>
            <h2>Interactive Digital Brand Design</h2>
        </div>
    </section>

    <!-- Portfolio Gallery Section -->
    <section class="gallery-section">
        <div class="gallery-grid" id="auto-gallery">
            <!-- The script below will automatically place your images here -->
        </div>
    </section>

    <script>
        // Kinetic Background Animation
        const canvas = document.getElementById('glcanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 1.2;
                this.vy = (Math.random() - 0.5) * 1.2;
                this.size = Math.random() * 1.5 + 0.5;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            for (let i = 0; i < particles.length; i++) {
                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 150) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 255, 255, ${(150 - distance) / 1000})`;
                        ctx.lineWidth = 0.8;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }
        animate();

        // Automated GitHub Image Fetcher
        async function loadPortfolioImages() {
            const repoUrl = 'https://api.github.com/repos/kayanisaqib/sk-graphics/contents/';
            
            try {
                const response = await fetch(repoUrl);
                const files = await response.json();
                const gallery = document.getElementById('auto-gallery');
                
                // Loops through everything you uploaded to GitHub
                files.forEach(file => {
                    // If it is an image file, it puts it on your website
                    if (file.name.match(/\.(jpeg|jpg|png|gif|webp)$/i)) {
                        const img = document.createElement('img');
                        img.src = file.name;
                        img.alt = "SK Graphics Digital Design";
                        gallery.appendChild(img);
                    }
                });
            } catch (error) {
                console.log("Error finding images:", error);
            }
        }
        
        // Run the fetcher immediately
        loadPortfolioImages();
    </script>
</body>
</html>
